name: Build Windows EXE

on:
  push:
    branches: [main]
  workflow_dispatch:

jobs:
  build:
    runs-on: windows-latest
    
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.9'

      - name: Install dependencies
        run: |
          pip install pyinstaller playwright-stealth playwright
          playwright install chromium --with-deps

      - name: Build EXE
        run: |
          pyinstaller --onefile --name TikTokDM tiktok_dm_stealth.py

      - name: Upload EXE artifact
        uses: actions/upload-artifact@v4
        with:
          name: TikTokDM-Windows
          path: dist/TikTokDM.exe
          retention-days: 7

  create-release:
    needs: build
    runs-on: ubuntu-latest
    if: startsWith(github.ref, 'refs/tags/v')
    
    steps:
      - name: Download EXE
        uses: actions/download-artifact@v4
        with:
          name: TikTokDM-Windows
          path: dist/

      - name: Create Release
        uses: softprops/action-gh-release@v1
        with:
          files: dist/TikTokDM.exe
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
